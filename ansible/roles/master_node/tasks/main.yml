- name: Copy admin.conf to home directory
  become: yes
  copy:
    src: "/etc/kubernetes/admin.conf" 
    dest: "~{{ new_user_name }}/.kube/config"
    owner: "{{ new_user_name }}"
    group: "{{ new_user_name }}"
    mode: 0755
    remote_src: true

# - name: Update kernel settings for installing flannel
